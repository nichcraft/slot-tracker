name: keepalive

# GitHub disables scheduled workflows after ~60 days without repository
# activity. When slots change often, state.json commits keep the schedule alive
# on their own; this monthly no-op commit is belt-and-suspenders for quiet
# stretches. GitHub also emails you before it disables anything, with a
# one-click re-enable.

on:
  schedule:
    - cron: "17 6 1 * *" # 06:17 UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Touch keepalive file
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git commit -m "chore: keepalive [skip ci]" || { echo "nothing to commit"; exit 0; }
          git push
