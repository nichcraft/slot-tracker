name: heartbeat

# Daily "still watching" confirmation to Telegram.
# 05:00 UTC = 09:00 Asia/Dubai (Dubai is UTC+4, no DST).
# GitHub cron is best-effort, so it may fire a little late.

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {} # fire it on demand from the Actions tab

permissions:
  contents: read

concurrency:
  group: slot-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send heartbeat
        env:
          HEARTBEAT: "1"
          EVENT_URL: ${{ secrets.EVENT_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node track.js
