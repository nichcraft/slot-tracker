name: heartbeat

# Daily "still watching" confirmation to Telegram, at 09:00 Asia/Dubai.
# Triggered externally by cron-job.org (Job B) via the workflow_dispatch API.
# GitHub's native `schedule:` cron was removed 2026-07-08 — it fired hours late,
# causing a duplicate, mistimed heartbeat.

on:
  workflow_dispatch: {} # also runnable on demand from the Actions tab

permissions:
  contents: read

concurrency:
  group: slot-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send heartbeat
        env:
          HEARTBEAT: "1"
          EVENT_URL: ${{ secrets.EVENT_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node track.js
