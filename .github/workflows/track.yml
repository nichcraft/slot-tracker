name: slot tracker

on:
  # Triggered externally every 5 min by cron-job.org via the workflow_dispatch API.
  # GitHub's native `schedule:` cron was removed 2026-07-08 — it fired unreliably/late.
  workflow_dispatch: {} # also runnable on demand from the Actions tab

# Needed so the job can commit the updated state.json back to the repo.
permissions:
  contents: write

# Never run two checks at once; let an in-flight run finish.
concurrency:
  group: slot-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check for new slots
        env:
          EVENT_URL: ${{ secrets.EVENT_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node track.js

      - name: Commit state if it changed
        if: success()
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update game state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
